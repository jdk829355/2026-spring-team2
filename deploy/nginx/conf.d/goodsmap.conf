upstream goodsmap_backend {
    server app:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name api.pinnedsignal.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.pinnedsignal.site;

    ssl_certificate /etc/letsencrypt/live/api.pinnedsignal.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pinnedsignal.site/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://goodsmap_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}